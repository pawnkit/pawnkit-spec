name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: read

jobs:
  validate:
    name: validate (go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.26", "stable"]
    defaults:
      run:
        working-directory: tools/validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: gofmt check
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "The following files are not gofmt'd:"
            echo "$fmt_out"
            exit 1
          fi

      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Validate schemas, examples, conformance docs, release sets, and RFC front matter
        run: go run . ../../schemas ../../profiles ../../examples ../../invalid-examples ../../conformance ../../release-sets ../../rfcs

  markdown-lint:
    name: markdown link/format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for obviously broken relative links
        run: |
          set -euo pipefail
          status=0
          while IFS= read -r -d '' file; do
            dir=$(dirname "$file")
            while read -r link; do
              [ -z "$link" ] && continue
              case "$link" in
                http*|/*) continue ;;
              esac
              if [ ! -f "$dir/$link" ]; then
                echo "broken relative link in $file: $link"
                status=1
              fi
            done < <(grep -oE '\]\(([^:)]+\.md)(#[^)]*)?\)' "$file" | sed -E 's/^\]\(([^)#]+).*/\1/')
          done < <(find . -name '*.md' -not -path './.git/*' -print0)
          exit "$status"

  compiler-probes:
    name: compiler probes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check out pawn-corpus
        uses: actions/checkout@v4
        with:
          repository: pawnkit/pawn-corpus
          ref: ff6369e0060edb8667379abd35207d7d893ea12b
          path: pawn-corpus

      - name: Download Pawn 3.10.10
        run: |
          wget -q https://github.com/pawn-lang/compiler/releases/download/v3.10.10/pawnc-3.10.10-linux.tar.gz
          echo "9bbb1df6e933318fce1fa61951e4196b70613c637a5a1d4c96937e147c18468d  pawnc-3.10.10-linux.tar.gz" | sha256sum -c -
          tar -xzf pawnc-3.10.10-linux.tar.gz

      - name: Run compiler probes
        env:
          PAWN_CORPUS: ${{ github.workspace }}/pawn-corpus
        run: ./conformance/compiler/run.sh "$PWD/pawnc-3.10.10-linux/bin/pawncc"

  published-schemas:
    name: published schema URLs
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Compare published schemas
        run: go run . --verify-urls ../../schemas
